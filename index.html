<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Visor de Cartografía</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-search@3.0.9/dist/leaflet-search.min.css" />
    <style>
        body { margin: 0; padding: 0; }
        #map { height: 100vh; width: 100%; }
    </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-search@3.0.9/dist/leaflet-search.min.js"></script>

<script>
    var map = L.map('map').setView([-12.0464, -77.0428], 12);

    // Fondo Satelital
    var satelital = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
        attribution: 'Tiles &copy; Esri'
    }).addTo(map);

    var baseLayers = { "Imagen Satelital": satelital };
    var overlays = {};
    var groupLayers = L.layerGroup().addTo(map);

    // Estilo: Sin relleno, línea amarilla grosor 2
    var estilo = { color: "#FFFF00", weight: 2, fillOpacity: 0 };

    // Función para cargar capas
    function cargarCapa(url, nombre) {
        fetch(url)
            .then(res => res.json())
            .then(data => {
                var capa = L.geoJSON(data, {
                    style: estilo,
                    onEachFeature: function(feature, layer) {
                        layer.bindTooltip("Segmento: " + feature.properties.NSEGM);
                    }
                });
                capa.addTo(groupLayers);
                overlays[nombre] = capa;
                // Actualizar control de capas
                L.control.layers(baseLayers, overlays).addTo(map);
            });
    }

    cargarCapa('MUESTRA_2023.geojson', 'Muestra 2023');
    cargarCapa('MUESTRA_2024.geojson', 'Muestra 2024');
    cargarCapa('MUESTRA_2025.geojson', 'Muestra 2025');

    // Buscador
    var searchControl = new L.Control.Search({
        layer: groupLayers,
        propertyName: 'NSEGM',
        marker: false,
        moveToLocation: function(latlng, title, map) {
            map.setView(latlng, 17); // Zoom al segmento encontrado
        }
    });
    map.addControl(searchControl);
</script>
</body>
</html>
