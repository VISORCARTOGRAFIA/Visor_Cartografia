<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visor de Muestras</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-search@3.0.9/dist/leaflet-search.min.css" />
    <style>
        body { margin: 0; padding: 0; }
        #map { height: 100vh; width: 100%; }
    </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-search@3.0.9/dist/leaflet-search.min.js"></script>

<script>
    // 1. Mapa centrado en Perú
    var map = L.map('map').setView([-9.0, -75.0], 6);

    // 2. Fondo Satelital
    var satelital = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
        attribution: 'Esri'
    }).addTo(map);

    // 3. Grupos para cada muestra
    var g2023 = L.layerGroup().addTo(map);
    var g2024 = L.layerGroup().addTo(map);
    var g2025 = L.layerGroup().addTo(map);

    // 4. Función de carga optimizada
    function cargarCapa(url, grupo) {
        fetch(url)
            .then(res => res.json())
            .then(data => {
                L.geoJSON(data, {
                    style: { color: "#FFFF00", weight: 2, fillOpacity: 0 },
                    onEachFeature: (f, l) => {
                        var id = f.properties.nsegm || f.properties.NSEGM || "Sin ID";
                        l.bindTooltip("Segmento: " + id);
                    }
                }).addTo(grupo);
            });
    }

    cargarCapa('MUESTRA_2023.geojson', g2023);
    cargarCapa('MUESTRA_2024.geojson', g2024);
    cargarCapa('MUESTRA_2025.geojson', g2025);

    // 5. Control de capas (Leyenda)
    L.control.layers({ "Imagen Satelital": satelital }, { 
        "Muestra 2023": g2023, 
        "Muestra 2024": g2024, 
        "Muestra 2025": g2025 
    }, {collapsed: false}).addTo(map);

    // 6. Buscador con zoom preciso a polígonos
    var todas = L.featureGroup([g2023, g2024, g2025]).addTo(map);
    
    var searchControl = new L.Control.Search({
        layer: todas,
        propertyName: 'nsegm', 
        initial: false,
        zoom: 17,
        textPlaceholder: 'Buscar segmento...'
    });

    // Acción al encontrar el segmento: Ajusta el zoom al polígono encontrado
    searchControl.on('search:locationfound', function(e) {
        if (e.layer.getBounds) {
            map.fitBounds(e.layer.getBounds(), { padding: [20, 20] });
        }
    });

    map.addControl(searchControl);
</script>
</body>
</html>
