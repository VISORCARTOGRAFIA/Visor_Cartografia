<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Visor de Muestras</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-search@3.0.9/dist/leaflet-search.min.css" />
    <style>
        body { margin: 0; padding: 0; }
        #map { height: 100vh; width: 100%; }
    </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-search@3.0.9/dist/leaflet-search.min.js"></script>

<script>
    var map = L.map('map').setView([-9.0, -75.0], 6);

    var satelital = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
        attribution: 'Esri'
    }).addTo(map);

    var g2023 = L.layerGroup().addTo(map);
    var g2024 = L.layerGroup().addTo(map);
    var g2025 = L.layerGroup().addTo(map);

    // Función con log de errores para detectar qué archivo falla
    function cargarCapa(url, grupo, nombre) {
        fetch(url)
            .then(res => {
                if (!res.ok) throw new Error("No se pudo cargar: " + url);
                return res.json();
            })
            .then(data => {
                L.geoJSON(data, {
                    style: { color: nombre === '2023' ? '#FFFF00' : (nombre === '2024' ? '#FF0000' : '#00FF00'), weight: 2, fillOpacity: 0 },
                    onEachFeature: (f, l) => {
                        var id = f.properties.nsegm || f.properties.NSEGM || "Sin ID";
                        l.bindTooltip(nombre + " - " + id);
                    }
                }).addTo(grupo);
                console.log("Capa " + nombre + " cargada correctamente.");
            })
            .catch(err => console.error("Error en capa " + nombre + ":", err));
    }

    cargarCapa('MUESTRA_2023.geojson', g2023, '2023');
    cargarCapa('MUESTRA_2024.geojson', g2024, '2024');
    cargarCapa('MUESTRA_2025.geojson', g2025, '2025');

    L.control.layers({ "Satelital": satelital }, { 
        "Muestra 2023": g2023, 
        "Muestra 2024": g2024, 
        "Muestra 2025": g2025 
    }, {collapsed: false}).addTo(map);

    var todas = L.featureGroup([g2023, g2024, g2025]).addTo(map);
    
    var searchControl = new L.Control.Search({
        layer: todas,
        propertyName: 'nsegm', 
        zoom: 17,
        textPlaceholder: 'Buscar segmento...'
    });

    searchControl.on('search:locationfound', function(e) {
        if (e.layer.getBounds) map.fitBounds(e.layer.getBounds(), {padding: [50, 50]});
    });

    map.addControl(searchControl);
</script>
</body>
</html>
