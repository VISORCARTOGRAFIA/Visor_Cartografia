<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Visor de Muestras</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-search@3.0.9/dist/leaflet-search.min.css" />
    <style>
        body { margin: 0; padding: 0; }
        #map { height: 100vh; width: 100%; }
    </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-search@3.0.9/dist/leaflet-search.min.js"></script>

<script>
    // 1. Centrar el mapa en Perú (ajusta según tus datos si es necesario)
    var map = L.map('map').setView([-9.0, -75.0], 6);

    // 2. Fondo Satelital
    var satelital = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
        attribution: 'Tiles &copy; Esri'
    }).addTo(map);

    // 3. Crear grupo de capas
    var todasLasMuestras = L.layerGroup().addTo(map);
    
    // 4. Estilo de tus polígonos
    var estilo = { color: "#FFFF00", weight: 2, fillOpacity: 0 };

    // Función para cargar archivos
    function cargarCapa(url) {
        fetch(url)
            .then(res => res.json())
            .then(data => {
                L.geoJSON(data, {
                    style: estilo,
                    onEachFeature: (feature, layer) => {
                        layer.bindTooltip("Segmento: " + (feature.properties.NSEGM || "Sin ID"));
                    }
                }).addTo(todasLasMuestras);
            })
            .catch(err => console.error("Error al cargar " + url, err));
    }

    // Cargar los 3 archivos
    cargarCapa('MUESTRA_2023.geojson');
    cargarCapa('MUESTRA_2024.geojson');
    cargarCapa('MUESTRA_2025.geojson');

    // 5. Control de Capas (Satelital + Muestras)
    var baseLayers = { "Imagen Satelital": satelital };
    var overlays = { "Capas de Muestras": todasLasMuestras };
    L.control.layers(baseLayers, overlays).addTo(map);

    // 6. Buscador
    var searchControl = new L.Control.Search({
        layer: todasLasMuestras,
        propertyName: 'NSEGM',
        marker: false,
        zoom: 16
    });
    map.addControl(searchControl);
</script>
</body>
</html>
