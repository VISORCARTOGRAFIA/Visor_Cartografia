<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Visor de Cartografía</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-search@3.0.9/dist/leaflet-search.min.css" />
    <style>
        body { margin: 0; padding: 0; }
        #map { height: 100vh; width: 100%; }
    </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-search@3.0.9/dist/leaflet-search.min.js"></script>

<script>
    var map = L.map('map').setView([-9.0, -75.0], 6);

    // Fondo Satelital
    var satelital = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
        attribution: 'Tiles &copy; Esri'
    }).addTo(map);

    // Capas individuales
    var capa2023 = L.layerGroup().addTo(map);
    var capa2024 = L.layerGroup().addTo(map);
    var capa2025 = L.layerGroup().addTo(map);

    // Función para cargar datos a su capa específica
    function cargarCapa(url, grupo) {
        fetch(url)
            .then(res => res.json())
            .then(data => {
                L.geoJSON(data, {
                    style: { color: "#FFFF00", weight: 2, fillOpacity: 0 },
                    onEachFeature: (feature, layer) => {
                        var id = feature.properties.nsegm || feature.properties.NSEGM || "N/A";
                        layer.bindTooltip("Segmento: " + id);
                    }
                }).addTo(grupo);
            });
    }

    cargarCapa('MUESTRA_2023.geojson', capa2023);
    cargarCapa('MUESTRA_2024.geojson', capa2024);
    cargarCapa('MUESTRA_2025.geojson', capa2025);

    // LEYENDA (Control de capas)
    var baseLayers = { "Imagen Satelital": satelital };
    var overlays = { 
        "Muestra 2023": capa2023,
        "Muestra 2024": capa2024,
        "Muestra 2025": capa2025 
    };
    L.control.layers(baseLayers, overlays).addTo(map);

    // BUSCADOR (Agrupa las 3 capas para buscar en todas)
    var todas = L.featureGroup([capa2023, capa2024, capa2025]).addTo(map);
    var searchControl = new L.Control.Search({
        layer: todas,
        propertyName: 'nsegm', // o 'NSEGM' según tu archivo
        marker: false,
        zoom: 17,
        textPlaceholder: 'Buscar Segmento...'
    });
    map.addControl(searchControl);
</script>
</body>
</html>
